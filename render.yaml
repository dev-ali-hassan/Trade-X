services:
  - type: web
    name: trade-x-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://dev-ali-hassan.github.io
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
