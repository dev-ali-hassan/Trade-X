<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade X</title>
    <script>
      const base = "/Trade-X/";
      const path = window.location.pathname.replace(base, "").replace(/^\/+/, "");
      const hash = window.location.hash || (path ? `#/${path}` : "#/");
      window.location.replace(`${base}${hash}`);
    </script>
  </head>
  <body>
    <p>Opening Trade X...</p>
  </body>
</html>
