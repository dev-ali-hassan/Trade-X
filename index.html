<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade X</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050506;
        font-family: Arial, sans-serif;
      }

      .logo {
        width: 220px;
        max-width: 80%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.08); opacity: 1; }
      }
    </style>
    <meta http-equiv="refresh" content="3;url=./frontend/dist/index.html" />
  </head>
  <body>
    <img class="logo" src="./logo.png" alt="Trade X logo" />
  </body>
</html>
