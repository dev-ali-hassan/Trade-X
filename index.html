<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const appBase = "/Trade-X/frontend/dist/";
      const appHtml = await fetch(`${appBase}index.html`).then((response) => {
        if (!response.ok) throw new Error("Trade X app build was not found.");
        return response.text();
      });

      const assetPath = (value) => value.replace("/Trade-X/", appBase);
      const cssMatch = appHtml.match(/href="([^"]+\.css)"/);
      const scriptMatch = appHtml.match(/src="([^"]+\.js)"/);

      if (cssMatch) {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.crossOrigin = "";
        link.href = assetPath(cssMatch[1]);
        document.head.appendChild(link);
      }

      if (!scriptMatch) {
        throw new Error("Trade X app script was not found.");
      }

      await import(assetPath(scriptMatch[1]));
    </script>
  </body>
</html>
